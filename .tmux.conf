# Use login shell so .zprofile is sourced in every pane
set -g default-command "${SHELL} -l"

# Alternative: Shift+Arrow keys
bind -n S-Left previous-window
bind -n S-Right next-window

# Pane switching without prefix (Ctrl+hjkl)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


# Mouse support (click to switch panes)
set -g mouse on

# Send tmux copy-mode selections to the macOS system clipboard.
set -s copy-command 'pbcopy'

# Active pane highlight
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39 bold'
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=colour39 bold]▶ #[default],  }#{pane_title} '

# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Session persistence across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
